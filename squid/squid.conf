# SquidBrocker - Squid Proxy Configuration

http_port 3128

# Go helper for time-based access control
# %SRC = source IP, %DST = destination domain
external_acl_type time_limiter ttl=60 children-max=2 %SRC %DST /usr/local/bin/squid-helper -config /etc/squid-brocker/rules.yaml -data /var/lib/squid-brocker

acl time_check external time_limiter

# LAN access
acl localnet src 192.168.0.0/16
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12

# Standard ports
acl SSL_ports port 443
acl Safe_ports port 80 443 1025-65535

# Deny non-standard ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Show custom page when time limit exceeded
deny_info ERR_TIME_LIMIT time_check
http_access deny !time_check

# Allow local network
http_access allow localnet

# Deny everything else
http_access deny all

# Custom error pages
error_directory /usr/share/squid/errors/ja

# Logging
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Cache settings (minimal for home use)
cache deny all

# PID file
pid_filename /run/squid.pid
